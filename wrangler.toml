# Wrangler config for Cloudflare Pages. Optional (the dashboard works too), but
# lets you run `wrangler pages dev public` and deploy from the CLI. Hugo → ./public.

name = "portfolio"
compatibility_date = "2025-01-15"
pages_build_output_dir = "public"

# Secrets go through `wrangler pages secret put`.
[vars]
ENVIRONMENT = "production"

[[env.preview.vars]]
ENVIRONMENT = "preview"
