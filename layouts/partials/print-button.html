{{- /*
  print-button — floating glass FAB shown on the CV page only (all viewports).
  Mirrors the scroll-to-top button's glass treatment; prints the current page.
  Self-gates on the page layout, and hides itself in the printout.
*/ -}}
{{- if eq .Layout "cv" }}
<button type="button" onclick="window.print()" aria-label="Print this page" title="Print" class="glass-btn fixed bottom-6 right-6 z-30 inline-flex h-12 w-12 items-center justify-center rounded-full text-fg transition-colors duration-200 ease-out hover:!text-accent focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/50 motion-reduce:transition-none print:!hidden">
  {{ partial "func/svg-icon.html" (dict "name" "printer" "class" "h-6 w-6" "width" "1.75") }}
</button>
{{- end }}
