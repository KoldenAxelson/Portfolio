{{- /*
  svg-icon — render a 24×24 outline icon from data/icons.yaml.
  Params (dict):
    name   (string, required) — key in data/icons.yaml
    class  (string)           — classes for the <svg>
    width  (string)           — stroke-width, default "1.6"
  Matches Neofolio's TopNav <svg> shape (fill none, stroke currentColor,
  round caps/joins). Falls back to nothing if the name is unknown.
*/ -}}
{{- $name := .name -}}
{{- $class := .class | default "h-5 w-5 shrink-0" -}}
{{- $sw := .width | default "1.6" -}}
{{- with index site.Data.icons $name -}}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{{ $sw }}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="{{ $class }}">{{ . | safeHTML }}</svg>
{{- end -}}
