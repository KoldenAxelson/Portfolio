name: Deploy to Cloudflare Pages

# Enabled: deploys main on push, builds PRs as previews, also runs on demand.
# Required repo configuration:
#   Secrets:  CLOUDFLARE_API_TOKEN  (Account:Developer Platform:Pages — Edit)
#             CLOUDFLARE_ACCOUNT_ID
#   Variable: CLOUDFLARE_PROJECT_NAME (Pages project slug)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
