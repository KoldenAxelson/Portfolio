name: Deploy to Cloudflare Pages

# DISABLED BY DEFAULT.
# This workflow ships with Neofolio as a documented option but is configured
# to run only on manual dispatch — so it doesn't fail-spam your inbox unless
# you've actually wired up Cloudflare. To enable automatic deploys, replace
# the `on:` block below with:
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#     workflow_dispatch:
#
# You also need to set these before the first run:
#
#   Secrets (Settings → Secrets and variables → Actions → Secrets):
#     CLOUDFLARE_API_TOKEN   — Pages:Edit + User Details:Read scopes
#     CLOUDFLARE_ACCOUNT_ID  — from the Cloudflare dashboard sidebar
#   Variable (Settings → Secrets and variables → Actions → Variables):
#     CLOUDFLARE_PROJECT_NAME — the Pages project slug
#
# Note: Cloudflare Pages can also deploy directly from its dashboard's Git
# integration, which is simpler than this workflow. Use this workflow if you
# want CI control (lint before push, multiple environments, custom matrix).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
