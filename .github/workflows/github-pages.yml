name: Deploy to GitHub Pages

# Disabled (manual-dispatch only). This site deploys via Cloudflare Pages —
# see .github/workflows/cloudflare-pages.yml. Kept as a fallback option:
# re-add `push:` triggers if you ever want to publish a mirror to GH Pages.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Auto-detect base path from the repo name. No manual config needed.
      #   user/org site (USERNAME.github.io)  → BASE_PATH = /
      #   custom domain (CNAME file present)  → BASE_PATH = /
      #   project site (anything else)        → BASE_PATH = /REPO_NAME
      #
      # Override with a repo variable (Settings → Actions → Variables → BASE_PATH)
      # if you need something different — e.g. a custom domain without a CNAME file.
      - name: Determine base path
        id: base
        run: |
          if [[ -n "${{ vars.BASE_PATH }}" ]]; then
            BASE="${{ vars.BASE_PATH }}"
          elif [[ -f public/CNAME ]]; then
            BASE="/"
          else
            REPO="${GITHUB_REPOSITORY#*/}"
            OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            REPO_LC=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
            if [[ "${REPO_LC}" == "${OWNER_LC}.github.io" ]]; then
              BASE="/"
            else
              BASE="/${REPO}"
            fi
          fi
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "Using BASE_PATH=${BASE}"

      - name: Build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
