# Portfolio — Hugo config. Deploys to Cloudflare Pages at the baseURL domain;
# sub-path hosts work too via baseURL's path component.

baseURL = "https://wrightfunctions.com/"
languageCode = "en-us"
title = "Konrad Wright"
enableRobotsTXT = true    # native robots.txt via layouts/robots.txt
enableInlineShortcodes = true

# Tags are plain front-matter arrays (project filter + tag chips), not taxonomies.
disableKinds = ["taxonomy", "term"]

# Home emits the JSON Feed + llms.txt; sections/pages stay HTML-only.
[outputs]
  home = ["HTML", "llms", "feedjson"]
  section = ["HTML"]
  page = ["HTML"]

[mediaTypes]
  [mediaTypes."application/feed+json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.llms]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    rel = "alternate"
  [outputFormats.feedjson]
    mediaType = "application/feed+json"
    baseName = "feed"
    isPlainText = true
    rel = "alternate"

# Map the content's pubDate / updatedDate keys onto Hugo's .Date / .Lastmod.
[frontmatter]
  date = ["pubDate", "date", "publishDate"]
  lastmod = ["updatedDate", "lastmod", ":git"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true          # allow raw HTML in Markdown
  [markup.highlight]
    noClasses = false      # emit classes so we theme code blocks with our palette
    lineNos = false
    tabWidth = 2

[params]
  # Identity and site data live in data/site.yaml, not here.

  # AI chat widget endpoint — the Cloudflare Worker URL the widget POSTs to.
  # This is the ONLY backend URL exposed to the browser; the tunnel hostname and
  # the shared secret stay server-side. Change here if the Worker route changes.
  aiChatURL = "https://ai.wrightfunctions.com/chat"
