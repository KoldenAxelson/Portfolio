# ---------------------------------------------------------------------------
# Site config
#
# Edit THIS file first. Everything user-facing reads from here.
# Don't hard-code your name, links, or bio anywhere else.
# ---------------------------------------------------------------------------

# Informational canonical URL. The live site's URLs (canonical, JSON-LD @ids,
# feeds, sitemap) all derive from Hugo's `baseURL`, so this documents intent.
url: "https://wrightfunctions.com"

# Site title — used in <title>, OpenGraph, and JSON-LD WebSite name.
title: "Konrad Wright"

# Tagline / meta description. Keep under 160 chars.
description: "Konrad Wright — software engineer: full-stack web, cloud (AWS, Cloudflare), and application security. Founder of VisorPlate & Widda."

# Owner identity. Used in <Person> JSON-LD and across the site.
author:
  name: "Konrad Wright"
  handle: "@KoldenAxelson"
  role: "Lead Software Engineer"
  location: "Paso Robles, CA"
  email: "KonradWright@Protonmail.com"
  # Intentionally blank — phone is not listed publicly. (Templates guard on
  # `with`, so an empty string renders nothing on the CV or anywhere else.)
  phone: ""
  # Short bio for the hero section. One or two sentences.
  bio: "I make specialized tools for people with problems, then I scale that solution to a magnitude of users."
  # Longer bio for the homepage hero, JSON-LD, and llms.txt.
  longBio: |
    Welcome to my little corner of the internet! I'm **your local tech bro**. Growing up, I was always the one people came to with their computer problems, and eventually Uncle Sam asked the same. I work best for the person right in front of me: I solve their niche problem, scale that solution up for the public, and replay that smile whenever a *Stripe notification* lands.

    Whether you're here to recruit, scope me out, or just see what I'm up to, this site has it all! I'm either working hard or hopelessly addicted to *Sudoku*.
  # CV summary — a concise, professional bio for the /cv Summary section.
  cvBio: >
    Lead software engineer with over fifteen years across web, automation, and
    product. A cross-domain generalist, I turn ambiguous problems into
    specialized tools and take them from concept to shipped, profitable product,
    designing, engineering, and scaling each solution myself. I'm open to roles
    where that range and end-to-end ownership matter.
  # Public résumé downloads (rendered on /cv). Set either to "" to hide.
  resume:
    pdf: "/resume.pdf"
    docx: "/resume.docx"

# Outbound social / professional links. Remove any you don't want shown.
# (Empty strings are skipped by the social-icons partial.)
links:
  github: "https://github.com/KoldenAxelson"
  linkedin: "https://www.linkedin.com/in/konrad-wright-b53860330/"
  twitter: ""
  mastodon: ""
  bluesky: ""

# Top-nav items. Order matters. Each `icon` keys into data/icons.yaml.
# Deliberately small: Projects (the work), About (the person + Now/Uses/Impossible
# List), Contact, CV. Articles & Certs are surfaced via the homepage section links;
# Now/Uses live under /about; the colophon lives in the footer.
nav:
  - { label: "Projects", href: "/projects", icon: "folder" }
  - { label: "About", href: "/about", icon: "user" }
  # "Email" opens the visitor's mail client. `email: true` is resolved to
  # mailto:<author.email> in topnav.html, keeping the address DRY (set above).
  # boost:false so htmx never tries to AJAX-swap the mailto link.
  - { label: "Email", email: true, icon: "envelope", boost: false }
  - { label: "CV", href: "/cv", icon: "cv" }

# Locale for <html lang> and date formatting. BCP-47 tag.
locale: "en-US"

# Default OpenGraph image (served from /static, no domain prefix).
ogImage: "/og-default.png"
