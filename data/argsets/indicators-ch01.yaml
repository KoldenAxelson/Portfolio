- category: invalid
  mode: deductive
  indicator: must
  passage: If it snowed last night, then the sidewalks would be slippery this morning. Walking in to work just now, I noticed the sidewalks are slippery. So it must have snowed last night.
  explanation: 'It''s deductive — the word “must” claims the conclusion follows with necessity: if the premises are true, it cannot be otherwise.'
- category: invalid
  mode: deductive
  indicator: certainly
