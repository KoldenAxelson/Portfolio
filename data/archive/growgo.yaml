title: 'GrowGo'
year: '2025'
reason: 'abandoned'
stack: ['Rust', 'Go', 'Swift', 'Kotlin', 'TypeScript']
postmortem: "Farmers-market application that everyone said they loved — and nobody wanted to fund. Rust/Go microservices, native iOS, native Android, and a web app: ambitious enough to swing for the fences on other people's money. When the love is universal and the wallets stay closed, that's when you know to move on."
